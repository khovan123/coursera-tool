<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coursera Tool</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <header>
      <div>
        <h1>Coursera Tool</h1>
        <p id="status">Checking current tab...</p>
      </div>
      <label class="switch" title="Enable extension">
        <input id="enabled" type="checkbox" />
        <span></span>
      </label>
    </header>

    <main>
      <section>
        <h2>Course runner</h2>
        <button id="runner" type="button">Start course runner</button>
        <label class="row"><span>Skip video/audio to the end</span><input id="skipVideo" type="checkbox" /></label>
        <label class="field"><span>Fallback playback speed</span><input id="playbackRate" type="number" min="0.25" max="16" step="0.25" /></label>
      </section>

      <section>
        <h2>Assessment assistant</h2>
        <label class="row"><span>Auto submit</span><input id="autoSubmit" type="checkbox" /></label>
        <label class="field"><span>Gemini API key</span><input id="geminiApiKey" type="password" autocomplete="off" placeholder="Required for answers" /></label>
        <label class="field"><span>Gemini model</span><input id="geminiModel" type="text" /></label>
        <button id="run" class="secondary" type="button">Answer this page</button>
      </section>
    </main>
    <script src="index.js"></script>
  </body>
</html>
